{% extends "base.html" %}

{% block title %}Excluir contato | Payroll ETL{% endblock %}

{% block content %}
  <h1>Excluir contato</h1>
  <p>Confirma excluir: <strong>{{ object.name }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Excluir</button>
  </form>
  <p><a href="{% url 'people:contato_list' %}">Cancelar</a></p>
{% endblock %}
