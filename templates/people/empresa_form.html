{% extends "base.html" %}

{% block title %}Empresa | Payroll ETL{% endblock %}

{% block content %}
  <h1>Empresa</h1>
  <div class="card" style="max-width: 720px;">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Salvar</button>
    </form>
  </div>
  <p><a class="btn" href="{% url 'people:empresa_list' %}">Voltar</a></p>
{% endblock %}
