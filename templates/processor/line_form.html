{% extends "base.html" %}

{% block title %}Item do Pedido | Payroll ETL{% endblock %}

{% block content %}
  <h1>{% if line %}Editar item{% else %}Adicionar item{% endif %}</h1>
  <p class="muted">Pedido #{{ order.id }} · {{ order.empresa.name }}</p>
  <div class="card" style="max-width: 720px;">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Salvar item</button>
    </form>
  </div>
  <p><a class="btn" href="{% url 'processor:order_detail' order.id %}">Voltar</a></p>
{% endblock %}
