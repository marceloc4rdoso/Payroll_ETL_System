{% extends "base.html" %}

{% block title %}Excluir sistema | Payroll ETL{% endblock %}

{% block content %}
  <h1>Excluir sistema</h1>
  <div class="card" style="max-width: 720px;">
    <p>Confirma excluir: <strong>{{ object.name }}</strong> ({{ object.code }})?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Excluir</button>
    </form>
  </div>
  <p><a class="btn" href="{% url 'processor:system_list' %}">Cancelar</a></p>
{% endblock %}
