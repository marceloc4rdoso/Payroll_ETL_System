{% extends "base.html" %}

{% block title %}Sistema | Payroll ETL{% endblock %}

{% block content %}
  <h1>Sistema</h1>
  <div class="card" style="max-width: 720px;">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Salvar</button>
    </form>
  </div>
  <p><a class="btn" href="{% url 'processor:system_list' %}">Voltar</a></p>
{% endblock %}
